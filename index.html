<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D T-REX RUN</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family: "Press Start 2P", ui-monospace, monospace;
      background: #d9edf0;
      color: #152026;
      --hud-title: clamp(15px, 2vw, 24px);
      --hud-meta: clamp(6px, 0.72vw, 9px);
      --hud-score: clamp(20px, 2.8vw, 34px);
      --hud-best: clamp(14px, 1.8vw, 22px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #d9edf0;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 14px;
      pointer-events: none;
      color: #17242a;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .brand {
      min-width: 0;
      display: grid;
      align-content: center;
      gap: 2px;
    }

    .score-label,
    .panel-meta {
      color: #506269;
      font-size: var(--hud-meta);
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 0;
      font-size: var(--hud-title);
      line-height: 1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      max-width: 520px;
      color: #40545b;
      font-size: clamp(13px, 2vw, 16px);
    }

    .scoreboard {
      display: flex;
      align-items: stretch;
      justify-content: end;
      gap: 18px;
      font-variant-numeric: tabular-nums;
    }

    .score-card {
      min-width: 122px;
      display: grid;
      align-content: center;
      justify-items: end;
      gap: 8px;
    }

    .score {
      font-size: var(--hud-score);
      font-weight: 800;
      line-height: 1.15;
    }

    .best {
      color: #1a2830;
      font-size: var(--hud-best);
      font-weight: 800;
      line-height: 1.15;
    }

    .overlay {
      display: none;
    }

    .panel {
      width: min(320px, calc(100vw - 32px));
      max-width: calc(100vw - 32px);
      border: 1px solid rgba(18, 31, 36, 0.16);
      border-radius: 8px;
      background: rgba(238, 245, 242, 0.72);
      box-shadow: 0 18px 42px rgba(31, 47, 55, 0.16);
      padding: 14px 14px 15px;
      text-align: left;
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .panel[hidden] {
      display: none;
    }

    .panel h2 {
      margin: 3px 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    .panel p {
      margin: 0 0 14px;
      color: #435860;
      font-size: 21px;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      justify-content: start;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 0 20px;
      background: #152026;
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(7, 13, 16, 0.72), 0 12px 20px rgba(22, 34, 41, 0.16);
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    button.secondary {
      background: #d34f37;
      box-shadow: 0 4px 0 rgba(108, 42, 29, 0.82), 0 12px 20px rgba(22, 34, 41, 0.14);
    }

    button:hover {
      background: #20313a;
      transform: translateY(-1px);
    }

    button.secondary:hover {
      background: #bd442f;
    }

    button:active {
      box-shadow: 0 2px 0 rgba(7, 13, 16, 0.72), 0 8px 14px rgba(22, 34, 41, 0.14);
      transform: translateY(2px);
    }

    .touch-controls {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 18px;
      display: none;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      pointer-events: none;
    }

    .touch-controls button {
      pointer-events: auto;
      min-width: 0;
      min-height: 62px;
      background: rgba(21, 32, 38, 0.86);
      backdrop-filter: blur(12px);
    }

    @media (max-width: 740px), (pointer: coarse) {
      .hud {
        top: 12px;
        left: 12px;
        right: 12px;
        gap: 8px;
      }

      .brand h1 {
        font-size: 13px;
      }

      .scoreboard {
        position: fixed;
        top: 12px;
        right: 12px;
        gap: 0;
      }

      .score-card {
        min-width: 96px;
        gap: 6px;
      }

      .score-card:nth-child(2) {
        display: none;
      }

      .score-label {
        font-size: 7px;
      }

      .score {
        font-size: 13px;
      }

      .overlay {
        padding: 76px 12px 94px;
      }

      .panel {
        width: min(250px, calc(100vw - 24px));
        margin-left: 0;
        padding: 12px;
      }

      .panel h2 {
        font-size: 22px;
      }

      .panel p {
        display: none;
      }

      .touch-controls {
        display: grid;
        right: auto;
        width: min(358px, calc(100vw - 32px));
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="3D dinosaur runner game"></canvas>

  <div class="hud" aria-live="polite">
    <div class="brand">
      <h1>3D T-REX RUN</h1>
    </div>
    <div class="scoreboard">
      <div class="score-card">
        <div class="score-label">Score</div>
        <div class="score" id="score">00000</div>
      </div>
      <div class="score-card">
        <div class="score-label">Best</div>
        <div class="best" id="best">00000</div>
      </div>
    </div>
  </div>

  <div class="overlay">
    <section class="panel" id="startPanel">
      <div class="panel-meta">Ready</div>
      <h2>Desert Sprint</h2>
      <p>Clean run. Sharp timing. One hit ends it.</p>
      <div class="actions">
        <button id="startButton">Start Game</button>
      </div>
    </section>

    <section class="panel" id="gameOverPanel" hidden>
      <div class="panel-meta">Run Ended</div>
      <h2>Game Over</h2>
      <p id="finalScore">Score 00000</p>
      <div class="actions">
        <button id="restartButton">Run Again</button>
        <button class="secondary" id="shareButton">Copy Score</button>
      </div>
    </section>
  </div>

  <div class="touch-controls">
    <button id="duckButton">Duck</button>
    <button id="jumpButton">Jump</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "https://unpkg.com/three@0.165.0/examples/jsm/loaders/GLTFLoader.js";

    const canvas = document.querySelector("#game");
    const scoreEl = document.querySelector("#score");
    const bestEl = document.querySelector("#best");
    const startPanel = document.querySelector("#startPanel");
    const gameOverPanel = document.querySelector("#gameOverPanel");
    const finalScoreEl = document.querySelector("#finalScore");
    const startButton = document.querySelector("#startButton");
    const restartButton = document.querySelector("#restartButton");
    const shareButton = document.querySelector("#shareButton");
    const jumpButton = document.querySelector("#jumpButton");
    const duckButton = document.querySelector("#duckButton");

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd9edf0);
    scene.fog = new THREE.Fog(0xd9edf0, 22, 68);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 120);
    camera.position.set(7.5, 5.2, 9.4);
    camera.lookAt(0, 1.3, 0);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x72919a, 2.2);
    scene.add(hemiLight);

    const sun = new THREE.DirectionalLight(0xffffff, 2.6);
    sun.position.set(8, 14, 7);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -18;
    sun.shadow.camera.right = 18;
    sun.shadow.camera.top = 18;
    sun.shadow.camera.bottom = -18;
    scene.add(sun);

    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0xf0d087, roughness: 0.92 });
    const ground = new THREE.Mesh(new THREE.BoxGeometry(260, 0.18, 7.5), groundMaterial);
    ground.position.set(18, -0.1, 0);
    ground.receiveShadow = true;
    scene.add(ground);

    const foregroundGroundMaterial = new THREE.MeshStandardMaterial({ color: 0xe6c579, roughness: 0.94 });
    const foregroundGround = new THREE.Mesh(new THREE.BoxGeometry(280, 0.12, 9), foregroundGroundMaterial);
    foregroundGround.position.set(22, -0.15, 7.2);
    foregroundGround.receiveShadow = true;
    scene.add(foregroundGround);

    const distantGroundMaterial = new THREE.MeshStandardMaterial({ color: 0xd8bd78, roughness: 0.96 });
    const distantGround = new THREE.Mesh(new THREE.BoxGeometry(300, 0.12, 24), distantGroundMaterial);
    distantGround.position.set(28, -0.16, -13.2);
    distantGround.receiveShadow = true;
    scene.add(distantGround);

    const duneMaterial = new THREE.MeshStandardMaterial({ color: 0xc9ad6f, roughness: 0.96 });
    const hillMaterial = new THREE.MeshStandardMaterial({ color: 0xb7a16d, roughness: 0.95 });
    const mesaMaterial = new THREE.MeshStandardMaterial({ color: 0xa9895d, roughness: 0.94 });
    const scrubMaterial = new THREE.MeshStandardMaterial({ color: 0x557f54, roughness: 0.9 });
    const rockMaterial = new THREE.MeshStandardMaterial({ color: 0x8d826d, roughness: 0.88 });
    const grassMaterial = new THREE.MeshStandardMaterial({ color: 0x9b8c4e, roughness: 0.9 });
    const boneMaterial = new THREE.MeshStandardMaterial({ color: 0xe8d8aa, roughness: 0.86 });
    const sandLineMaterial = new THREE.MeshBasicMaterial({ color: 0xb9995f, transparent: true, opacity: 0.48 });
    const edgeShadeMaterial = new THREE.MeshBasicMaterial({ color: 0x9f8959, transparent: true, opacity: 0.34 });
    const pebbleMaterial = new THREE.MeshStandardMaterial({ color: 0x9c8b73, roughness: 0.92 });
    const skyAccentMaterial = new THREE.MeshBasicMaterial({ color: 0xf5c86c });
    const moonMaterial = new THREE.MeshBasicMaterial({ color: 0xdfe7ef });
    const distantBirdMaterial = new THREE.MeshBasicMaterial({ color: 0x34424a });
    const dustMaterial = new THREE.MeshBasicMaterial({ color: 0xc5a66c, transparent: true, opacity: 0.42 });
    const backgroundProps = [];
    const foregroundProps = [];
    const skyLife = [];
    const dustPuffs = [];

    const sunDisk = new THREE.Mesh(new THREE.SphereGeometry(0.52, 20, 12), skyAccentMaterial);
    sunDisk.position.set(12, 7.8, -18);
    scene.add(sunDisk);

    const moonDisk = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 10), moonMaterial);
    moonDisk.position.set(-10, 7.2, -18);
    scene.add(moonDisk);

    function createDune(x, z, width, depth, height) {
      const dune = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), duneMaterial);
      dune.position.set(x, height / 2 - 0.1, z);
      dune.rotation.y = -0.08 + Math.random() * 0.16;
      dune.receiveShadow = true;
      scene.add(dune);
      backgroundProps.push(dune);
    }

    function createHill(x, z, width, height) {
      const hill = new THREE.Mesh(new THREE.ConeGeometry(width, height, 4), hillMaterial);
      hill.position.set(x, height / 2 - 0.1, z);
      hill.rotation.y = Math.PI / 4;
      hill.scale.z = 0.42;
      hill.receiveShadow = true;
      scene.add(hill);
      backgroundProps.push(hill);
    }

    function createMesa(x, z, scale = 1) {
      const mesa = new THREE.Group();
      const base = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.75, 0.72, 7), mesaMaterial);
      base.position.y = 0.26;
      base.scale.set(1.6 * scale, 1, 0.78 * scale);
      base.castShadow = true;
      base.receiveShadow = true;
      mesa.add(base);

      const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.58, 0.18, 7), mesaMaterial);
      cap.position.y = 0.7;
      cap.scale.set(1.75 * scale, 1, 0.84 * scale);
      cap.castShadow = true;
      cap.receiveShadow = true;
      mesa.add(cap);

      mesa.position.set(x, -0.08, z);
      mesa.rotation.y = Math.random() * Math.PI;
      scene.add(mesa);
      backgroundProps.push(mesa);
    }

    function createScrub(x, z, scale = 1) {
      const scrub = new THREE.Group();
      const clumps = [
        [-0.18, 0, 0, 0.24],
        [0.02, 0.02, 0.04, 0.3],
        [0.22, 0, -0.02, 0.2],
      ];
      clumps.forEach(([px, py, pz, radius]) => {
        const clump = new THREE.Mesh(new THREE.SphereGeometry(radius, 8, 5), scrubMaterial);
        clump.position.set(px, radius * 0.55 + py, pz);
        clump.scale.y = 0.55;
        clump.castShadow = true;
        clump.receiveShadow = true;
        scrub.add(clump);
      });
      scrub.position.set(x, 0.02, z);
      scrub.scale.setScalar(scale);
      scene.add(scrub);
      foregroundProps.push(scrub);
    }

    function createRock(x, z, scale = 1) {
      const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.22 * scale, 0), rockMaterial);
      rock.position.set(x, 0.12 * scale, z);
      rock.rotation.set(Math.random() * 0.7, Math.random() * 1.6, Math.random() * 0.4);
      rock.scale.set(1.35, 0.58, 0.82);
      rock.castShadow = true;
      rock.receiveShadow = true;
      scene.add(rock);
      foregroundProps.push(rock);
    }

    function createSandLine(x, z, length = 0.9, angle = 0) {
      const line = new THREE.Mesh(new THREE.BoxGeometry(length, 0.012, 0.035), sandLineMaterial);
      line.position.set(x, 0.02, z);
      line.rotation.y = angle;
      scene.add(line);
      foregroundProps.push(line);
    }

    function createEdgeShade(x, z, length = 4.2) {
      const shade = new THREE.Mesh(new THREE.BoxGeometry(length, 0.01, 0.045), edgeShadeMaterial);
      shade.position.set(x, 0.025, z);
      shade.rotation.y = -0.34;
      scene.add(shade);
      foregroundProps.push(shade);
    }

    function createPebbleCluster(x, z, scale = 1) {
      const cluster = new THREE.Group();
      for (let i = 0; i < 4; i += 1) {
        const pebble = new THREE.Mesh(new THREE.DodecahedronGeometry(0.045 * scale, 0), pebbleMaterial);
        pebble.position.set((Math.random() - 0.5) * 0.42, 0.035, (Math.random() - 0.5) * 0.22);
        pebble.scale.set(1.2, 0.45, 0.9);
        pebble.rotation.set(Math.random(), Math.random() * Math.PI, Math.random());
        pebble.castShadow = true;
        cluster.add(pebble);
      }
      cluster.position.set(x, 0.01, z);
      scene.add(cluster);
      foregroundProps.push(cluster);
    }

    function createGrassTuft(x, z, scale = 1) {
      const tuft = new THREE.Group();
      for (let i = 0; i < 5; i += 1) {
        const blade = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.34 + i * 0.025, 4), grassMaterial);
        blade.position.set((i - 2) * 0.055, 0.16, (i % 2) * 0.035);
        blade.rotation.z = (i - 2) * 0.16;
        blade.castShadow = true;
        tuft.add(blade);
      }
      tuft.position.set(x, 0.02, z);
      tuft.scale.setScalar(scale);
      scene.add(tuft);
      foregroundProps.push(tuft);
    }

    function createBonePile(x, z, scale = 1) {
      const bones = new THREE.Group();
      const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.48, 8), boneMaterial);
      shaft.rotation.z = Math.PI / 2;
      shaft.position.y = 0.08;
      bones.add(shaft);

      [-0.26, 0.26].forEach((px) => {
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 6), boneMaterial);
        knob.position.set(px, 0.08, 0);
        bones.add(knob);
      });

      bones.position.set(x, 0.03, z);
      bones.rotation.y = Math.random() * Math.PI;
      bones.scale.setScalar(scale);
      scene.add(bones);
      foregroundProps.push(bones);
    }

    function createDistantBird(x, y, z, scale = 1) {
      const bird = new THREE.Group();
      const leftWing = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.035, 0.035), distantBirdMaterial);
      const rightWing = leftWing.clone();
      leftWing.position.x = -0.2;
      rightWing.position.x = 0.2;
      bird.add(leftWing, rightWing);
      bird.position.set(x, y, z);
      bird.scale.setScalar(scale);
      bird.userData = { phase: Math.random() * Math.PI * 2, leftWing, rightWing };
      scene.add(bird);
      skyLife.push(bird);
    }

    for (let i = 0; i < 9; i += 1) {
      createHill(i * 8 - 24, -8.6 - (i % 3) * 1.1, 2.4 + (i % 3) * 0.55, 1.25 + (i % 4) * 0.18);
    }

    for (let i = 0; i < 8; i += 1) {
      createDune(i * 9 - 28, -6.7 - (i % 2) * 0.8, 6 + (i % 3) * 1.4, 0.9, 0.16 + (i % 2) * 0.05);
    }

    for (let i = 0; i < 7; i += 1) {
      createMesa(i * 10 - 30, -10.4 - (i % 2) * 1.2, 0.75 + (i % 3) * 0.12);
    }

    for (let i = 0; i < 20; i += 1) {
      const x = i * 3.4 - 32;
      const nearSide = i % 2 === 0;
      createScrub(x, nearSide ? 3.15 : -3.25, 0.72 + (i % 4) * 0.12);
      createGrassTuft(x + 0.9, nearSide ? 2.55 : -2.48, 0.75 + (i % 3) * 0.08);
      if (i % 3 === 0) {
        createRock(x + 1.35, nearSide ? 2.65 : -2.72, 0.75 + (i % 5) * 0.1);
      }
      if (i % 7 === 2) {
        createBonePile(x + 1.9, nearSide ? 3.05 : -3.05, 0.7 + (i % 4) * 0.08);
      }
    }

    for (let i = 0; i < 34; i += 1) {
      const x = i * 2.15 - 34;
      const z = i % 2 === 0 ? 2.15 + (i % 4) * 0.28 : -2.18 - (i % 3) * 0.24;
      createSandLine(x, z, 0.5 + (i % 5) * 0.12, -0.22 + (i % 4) * 0.08);
      if (i % 4 === 0) {
        createPebbleCluster(x + 0.7, z + 0.18, 0.7 + (i % 3) * 0.16);
      }
    }

    for (let i = 0; i < 16; i += 1) {
      createEdgeShade(i * 4.4 - 34, 3.72, 2.7 + (i % 3) * 0.6);
      createEdgeShade(i * 4.4 - 32, -3.72, 2.4 + (i % 2) * 0.7);
    }

    const cloudMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7 });
    const clouds = [];
    function createCloud(x, y, z, scale) {
      const cloud = new THREE.Group();
      const parts = [
        [0, 0, 0, 1.3, 0.55, 0.55],
        [0.55, 0.1, 0, 0.85, 0.72, 0.55],
        [-0.55, 0.03, 0, 0.75, 0.55, 0.55],
      ];
      parts.forEach(([px, py, pz, sx, sy, sz]) => {
        const puff = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 12), cloudMaterial);
        puff.scale.set(sx, sy, sz);
        puff.position.set(px, py, pz);
        cloud.add(puff);
      });
      cloud.position.set(x, y, z);
      cloud.scale.setScalar(scale);
      scene.add(cloud);
      clouds.push(cloud);
    }

    createCloud(11, 6.3, -9, 1.1);
    createCloud(-7, 7.2, -12, 0.82);
    createCloud(22, 5.8, -10, 0.9);

    createDistantBird(8, 5.3, -11, 0.9);
    createDistantBird(15, 6.1, -13, 0.72);
    createDistantBird(-6, 5.7, -12, 0.62);

    const menuCanvas = document.createElement("canvas");
    menuCanvas.width = 1024;
    menuCanvas.height = 512;
    const menuContext = menuCanvas.getContext("2d");
    const menuTexture = new THREE.CanvasTexture(menuCanvas);
    menuTexture.colorSpace = THREE.SRGBColorSpace;
    menuTexture.anisotropy = 4;
    menuTexture.magFilter = THREE.NearestFilter;

    const menuGroup = new THREE.Group();
    const menuBoardMaterial = new THREE.MeshStandardMaterial({
      map: menuTexture,
      color: 0xffffff,
      roughness: 0.78,
      metalness: 0,
    });
    const menuBoard = new THREE.Mesh(new THREE.BoxGeometry(5.2, 2.45, 0.14), menuBoardMaterial);
    menuBoard.castShadow = true;
    menuBoard.receiveShadow = true;
    menuBoard.userData.clickableMenu = true;
    menuGroup.add(menuBoard);

    const postMaterial = new THREE.MeshStandardMaterial({ color: 0x6f5639, roughness: 0.9 });
    [-2.08, 2.08].forEach((x) => {
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.16, 1.65, 0.16), postMaterial);
      post.position.set(x, -1.32, -0.03);
      post.castShadow = true;
      post.receiveShadow = true;
      menuGroup.add(post);
    });

    const menuButtonMaterial = new THREE.MeshStandardMaterial({ color: 0x152026, roughness: 0.75 });
    const menuButton = new THREE.Mesh(new THREE.BoxGeometry(1.95, 0.46, 0.08), menuButtonMaterial);
    menuButton.position.set(0, -0.62, -0.1);
    menuButton.castShadow = true;
    menuButton.userData.clickableMenu = true;
    menuGroup.add(menuButton);

    menuGroup.position.set(-4.75, 1.62, -0.95);
    menuGroup.rotation.set(-0.05, 0.38, 0);
    const menuHomePosition = new THREE.Vector3(-7.45, 1.62, 2.35);
    const menuGameOverPosition = new THREE.Vector3(-6.55, 1.62, 2.05);
    const menuExitPosition = new THREE.Vector3(-54, 1.62, 2.35);
    const mobileMenuHomePosition = new THREE.Vector3(-7.1, 1.5, 1.65);
    const mobileMenuGameOverPosition = new THREE.Vector3(-6.7, 1.5, 1.5);
    const mobileMenuExitPosition = new THREE.Vector3(-34, 1.72, 1.25);
    let activeMenuHomePosition = menuHomePosition.clone();
    let activeMenuGameOverPosition = menuGameOverPosition.clone();
    let activeMenuExitPosition = menuExitPosition.clone();
    menuGroup.position.copy(activeMenuHomePosition);
    menuGroup.userData = { exiting: false, mode: "start", target: activeMenuHomePosition.clone() };
    scene.add(menuGroup);

    let menuMode = "start";
    let menuScore = 0;

    function drawMenuTexture(mode, score = 0) {
      menuMode = mode;
      menuScore = score;
      menuContext.clearRect(0, 0, menuCanvas.width, menuCanvas.height);
      const gradient = menuContext.createLinearGradient(0, 0, 0, menuCanvas.height);
      gradient.addColorStop(0, "#eef5f2");
      gradient.addColorStop(1, "#d7dfd9");
      menuContext.fillStyle = gradient;
      menuContext.fillRect(0, 0, menuCanvas.width, menuCanvas.height);

      menuContext.strokeStyle = "#17242a";
      menuContext.lineWidth = 18;
      menuContext.strokeRect(22, 22, menuCanvas.width - 44, menuCanvas.height - 44);

      menuContext.fillStyle = "#506269";
      menuContext.font = "34px 'Press Start 2P', monospace";
      menuContext.fillText(mode === "gameover" ? "RUN ENDED" : "READY", 70, 96);

      menuContext.fillStyle = "#152026";
      menuContext.font = "70px 'Press Start 2P', monospace";
      menuContext.fillText(mode === "gameover" ? "GAME OVER" : "T-REX RUN", 70, 205);

      menuContext.font = "26px 'Press Start 2P', monospace";
      const line = mode === "gameover"
        ? `SCORE ${formatScore(score)}`
        : "JUMP  DUCK  RUN";
      menuContext.fillText(line, 72, 286);

      menuContext.fillStyle = "#152026";
      menuContext.fillRect(278, 344, 468, 98);
      menuContext.fillStyle = "#ffffff";
      menuContext.font = "28px 'Press Start 2P', monospace";
      menuContext.textAlign = "center";
      menuContext.fillText(mode === "gameover" ? "RESTART" : "START", 512, 407);
      menuContext.textAlign = "left";

      menuTexture.needsUpdate = true;
    }

    drawMenuTexture("start");
    document.fonts?.ready.then(() => drawMenuTexture(menuMode, menuScore));

    function showMenuSign(mode, score = 0) {
      drawMenuTexture(mode, score);
      menuGroup.visible = true;
      menuGroup.userData.exiting = false;
      menuGroup.userData.mode = mode;
      menuGroup.userData.target = (mode === "gameover" ? activeMenuGameOverPosition : activeMenuHomePosition).clone();
      menuGroup.position.copy(menuGroup.userData.target);
    }

    function exitMenuSign() {
      menuGroup.visible = true;
      menuGroup.userData.exiting = true;
      menuGroup.userData.target = activeMenuExitPosition.clone();
    }

    function updateMenuSign(delta) {
      if (!menuGroup.visible) {
        return;
      }

      if (menuGroup.userData.exiting) {
        menuGroup.position.x -= state.speed * delta;
        if (menuGroup.position.x < activeMenuExitPosition.x) {
          menuGroup.visible = false;
          menuGroup.userData.exiting = false;
        }
        return;
      }

      menuGroup.position.lerp(menuGroup.userData.target, Math.min(1, delta * 2.8));
    }

    const dino = new THREE.Group();
    const dinoModelPivot = new THREE.Group();
    dinoModelPivot.position.y = -0.56;
    dino.add(dinoModelPivot);
    scene.add(dino);

    let dinoMixer = null;
    let dinoModel = null;
    const dinoActions = new Map();
    let activeDinoAction = null;

    dino.position.set(-4.2, 0.58, 0);

    function normalizeDinoModel(model) {
      model.position.set(0, 0, 0);
      model.rotation.set(0, Math.PI / 2, 0);
      model.scale.setScalar(1);
      model.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const scale = 1.95 / Math.max(size.y, 0.001);

      model.scale.setScalar(scale);
      model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
    }

    function loadDinoModel() {
      const loader = new GLTFLoader();
      loader.load(
        "assets/tyrannosaurus_rex.glb",
        (gltf) => {
          dinoModel = gltf.scene;
          dinoModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          normalizeDinoModel(dinoModel);
          dinoModelPivot.add(dinoModel);

          if (gltf.animations.length > 0) {
            dinoMixer = new THREE.AnimationMixer(dinoModel);
            gltf.animations.forEach((clip) => {
              dinoActions.set(clip.name.toLowerCase(), dinoMixer.clipAction(clip));
            });
            playDinoAnimation("idle");
          }
        },
        undefined,
        (error) => {
          console.error("Unable to load dinosaur model", error);
        },
      );
    }

    loadDinoModel();

    function getDinoAction(name) {
      const exact = dinoActions.get(`trex_${name}`) || dinoActions.get(name);
      if (exact) {
        return exact;
      }
      return [...dinoActions.entries()].find(([clipName]) => clipName.includes(name))?.[1] || null;
    }

    function playDinoAnimation(name) {
      const nextAction = getDinoAction(name) || getDinoAction("idle") || [...dinoActions.values()][0];
      if (!nextAction || nextAction === activeDinoAction) {
        return;
      }

      nextAction.reset().fadeIn(0.16).play();
      if (activeDinoAction) {
        activeDinoAction.fadeOut(0.16);
      }
      activeDinoAction = nextAction;
    }

    const cactusMaterial = new THREE.MeshStandardMaterial({ color: 0x28744a, roughness: 0.85 });
    const cactusHighlightMaterial = new THREE.MeshStandardMaterial({ color: 0x3c9a60, roughness: 0.82 });
    const birdMaterial = new THREE.MeshStandardMaterial({ color: 0x495963, roughness: 0.75 });
    const birdBeakMaterial = new THREE.MeshStandardMaterial({ color: 0xd8a142, roughness: 0.72 });
    const obstacles = [];

    function cactusSegment(radius, height, position, parent, horizontal = false) {
      const geometry = new THREE.CylinderGeometry(radius, radius * 0.92, height, 8, 1);
      const part = new THREE.Mesh(geometry, cactusMaterial);
      part.position.copy(position);
      if (horizontal) {
        part.rotation.z = Math.PI / 2;
      }
      part.castShadow = true;
      part.receiveShadow = true;
      parent.add(part);
      return part;
    }

    function cactusCap(radius, position, parent) {
      const cap = new THREE.Mesh(new THREE.SphereGeometry(radius, 8, 6), cactusMaterial);
      cap.scale.y = 0.78;
      cap.position.copy(position);
      cap.castShadow = true;
      cap.receiveShadow = true;
      parent.add(cap);
      return cap;
    }

    function cactusRidge(height, x, z, parent) {
      const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.035, height, 0.018), cactusHighlightMaterial);
      ridge.position.set(x, height / 2, z);
      ridge.castShadow = true;
      parent.add(ridge);
      return ridge;
    }

    function createCactus(x) {
      const group = new THREE.Group();
      const tall = 1 + Math.random() * 0.55;

      cactusSegment(0.2, tall, new THREE.Vector3(0, tall / 2, 0), group);
      cactusCap(0.2, new THREE.Vector3(0, tall, 0), group);
      cactusRidge(tall * 0.82, 0.13, 0.13, group);
      cactusRidge(tall * 0.7, -0.13, -0.13, group);

      const rightArmHeight = 0.42 + Math.random() * 0.24;
      const rightArmY = tall * THREE.MathUtils.randFloat(0.43, 0.62);
      cactusSegment(0.12, 0.5, new THREE.Vector3(0.29, rightArmY, 0), group, true);
      cactusSegment(0.12, rightArmHeight, new THREE.Vector3(0.53, rightArmY + rightArmHeight / 2 - 0.02, 0), group);
      cactusCap(0.12, new THREE.Vector3(0.53, rightArmY + rightArmHeight - 0.02, 0), group);

      if (Math.random() > 0.32) {
        const leftArmHeight = 0.34 + Math.random() * 0.22;
        const leftArmY = tall * THREE.MathUtils.randFloat(0.34, 0.52);
        cactusSegment(0.105, 0.42, new THREE.Vector3(-0.25, leftArmY, 0), group, true);
        cactusSegment(0.105, leftArmHeight, new THREE.Vector3(-0.45, leftArmY + leftArmHeight / 2 - 0.02, 0), group);
        cactusCap(0.105, new THREE.Vector3(-0.45, leftArmY + leftArmHeight - 0.02, 0), group);
      }

      group.position.set(x, 0, 0);
      group.userData = { type: "cactus", radius: 0.56, height: tall * 0.9 };
      scene.add(group);
      obstacles.push(group);
    }

    function createBirdWing(side) {
      const wing = new THREE.Group();
      const upper = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.055, 0.18), birdMaterial);
      upper.position.x = side * 0.24;
      upper.rotation.z = side * 0.22;
      upper.castShadow = true;
      wing.add(upper);

      const tip = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.36, 4), birdMaterial);
      tip.position.x = side * 0.52;
      tip.rotation.z = -side * Math.PI / 2;
      tip.scale.z = 0.45;
      tip.castShadow = true;
      wing.add(tip);

      wing.position.set(side * 0.18, 0.03, 0);
      return wing;
    }

    function createBird(x) {
      const group = new THREE.Group();

      const bodyMesh = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 8), birdMaterial);
      bodyMesh.scale.set(1.35, 0.72, 0.78);
      bodyMesh.castShadow = true;
      group.add(bodyMesh);

      const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 8), birdMaterial);
      headMesh.position.set(0.34, 0.12, 0);
      headMesh.scale.set(1, 0.9, 0.9);
      headMesh.castShadow = true;
      group.add(headMesh);

      const beak = new THREE.Mesh(new THREE.ConeGeometry(0.075, 0.22, 4), birdBeakMaterial);
      beak.position.set(0.52, 0.1, 0);
      beak.rotation.z = -Math.PI / 2;
      beak.castShadow = true;
      group.add(beak);

      const tail = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.34, 4), birdMaterial);
      tail.position.set(-0.36, -0.02, 0);
      tail.rotation.z = Math.PI / 2;
      tail.scale.z = 0.55;
      tail.castShadow = true;
      group.add(tail);

      const leftWing = createBirdWing(-1);
      const rightWing = createBirdWing(1);
      group.add(leftWing, rightWing);

      group.position.set(x, 1.82 + Math.random() * 0.26, 0);
      group.userData = { type: "bird", radius: 0.58, phase: Math.random() * Math.PI * 2, leftWing, rightWing };
      scene.add(group);
      obstacles.push(group);
    }

    const state = {
      running: false,
      gameOver: false,
      velocityY: 0,
      ducking: false,
      score: 0,
      best: Number(localStorage.getItem("dino3d-best") || 0),
      speed: 8.5,
      spawnTimer: 1.1,
      dustTimer: 0,
      nextScoreChime: 250,
      elapsed: 0,
      dayNight: 0,
    };

    bestEl.textContent = formatScore(state.best);

    function formatScore(value) {
      return Math.floor(value).toString().padStart(5, "0");
    }

    let audioContext = null;
    let audioEnabled = false;

    function ensureAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
      audioEnabled = true;
    }

    function playTone(frequency, duration, type = "square", volume = 0.08, slideTo = frequency) {
      if (!audioEnabled || !audioContext) {
        return;
      }

      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);
      oscillator.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), now + duration);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      oscillator.connect(gain).connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.02);
    }

    function playNoise(duration, volume = 0.08, cutoff = 900) {
      if (!audioEnabled || !audioContext) {
        return;
      }

      const now = audioContext.currentTime;
      const length = Math.max(1, Math.floor(audioContext.sampleRate * duration));
      const buffer = audioContext.createBuffer(1, length, audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / length);
      }

      const source = audioContext.createBufferSource();
      const filter = audioContext.createBiquadFilter();
      const gain = audioContext.createGain();
      source.buffer = buffer;
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(cutoff, now);
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      source.connect(filter).connect(gain).connect(audioContext.destination);
      source.start(now);
    }

    function playStartSound() {
      playTone(220, 0.08, "square", 0.07, 330);
      window.setTimeout(() => playTone(440, 0.09, "square", 0.06, 660), 70);
    }

    function playJumpSound() {
      playTone(310, 0.12, "square", 0.065, 620);
    }

    function playDropSound() {
      playNoise(0.08, 0.045, 520);
    }

    function playHitSound() {
      playNoise(0.22, 0.12, 420);
      playTone(150, 0.22, "sawtooth", 0.08, 55);
    }

    function playScoreSound() {
      playTone(660, 0.06, "square", 0.045, 880);
    }

    function resetGame() {
      ensureAudio();
      obstacles.splice(0).forEach((obstacle) => scene.remove(obstacle));
      state.running = true;
      state.gameOver = false;
      state.velocityY = 0;
      state.ducking = false;
      state.score = 0;
      state.speed = 8.5;
      state.spawnTimer = 0.9;
      state.dustTimer = 0;
      state.nextScoreChime = 250;
      state.elapsed = 0;
      state.dayNight = 0;
      dino.position.set(-4.2, 0.58, 0);
      dino.rotation.set(0, 0, 0);
      exitMenuSign();
      playDinoAnimation("run");
      startPanel.hidden = true;
      gameOverPanel.hidden = true;
      scoreEl.textContent = "00000";
      playStartSound();
    }

    function endGame() {
      if (state.gameOver) {
        return;
      }
      state.running = false;
      state.gameOver = true;
      state.best = Math.max(state.best, Math.floor(state.score));
      localStorage.setItem("dino3d-best", String(state.best));
      bestEl.textContent = formatScore(state.best);
      finalScoreEl.textContent = `Score ${formatScore(state.score)}`;
      showMenuSign("gameover", state.score);
      playDinoAnimation("roar");
      gameOverPanel.hidden = false;
      playHitSound();
    }

    function jump() {
      ensureAudio();
      if (!state.running) {
        resetGame();
        return;
      }
      if (dino.position.y <= 0.61) {
        state.velocityY = 11.1;
        playJumpSound();
      }
    }

    function setDuck(active) {
      state.ducking = active && state.running && dino.position.y <= 0.62;
    }

    function dropFast() {
      ensureAudio();
      if (!state.running) {
        return;
      }

      if (dino.position.y > 0.62) {
        state.velocityY = Math.min(state.velocityY, -13);
        playDropSound();
        return;
      }

      setDuck(true);
      playDropSound();
    }

    function spawnDustPuff() {
      const puff = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), dustMaterial.clone());
      puff.position.set(dino.position.x - 0.85, 0.08, 0.1 + Math.random() * 0.32);
      puff.scale.set(1.2, 0.42, 0.85);
      puff.userData = { life: 0.52, maxLife: 0.52, drift: 0.35 + Math.random() * 0.25 };
      scene.add(puff);
      dustPuffs.push(puff);
    }

    function updateDust(delta) {
      if (state.running && dino.position.y <= 0.62) {
        state.dustTimer -= delta;
        if (state.dustTimer <= 0) {
          spawnDustPuff();
          state.dustTimer = 0.08;
        }
      }

      for (let i = dustPuffs.length - 1; i >= 0; i -= 1) {
        const puff = dustPuffs[i];
        puff.userData.life -= delta;
        puff.position.x -= state.speed * delta * 0.22;
        puff.position.y += delta * 0.18;
        puff.position.z += puff.userData.drift * delta;
        puff.scale.multiplyScalar(1 + delta * 0.8);
        puff.material.opacity = Math.max(0, 0.42 * (puff.userData.life / puff.userData.maxLife));

        if (puff.userData.life <= 0) {
          scene.remove(puff);
          puff.material.dispose();
          puff.geometry.dispose();
          dustPuffs.splice(i, 1);
        }
      }
    }

    function spawnObstacle() {
      if (Math.random() > 0.76 && state.score > 120) {
        createBird(20);
      } else {
        createCactus(20);
      }
      state.spawnTimer = THREE.MathUtils.randFloat(0.72, 1.32) * Math.max(0.58, 9.5 / state.speed);
    }

    function updateDino(delta) {
      state.velocityY -= 25 * delta;
      dino.position.y += state.velocityY * delta;
      if (dino.position.y < 0.58) {
        dino.position.y = 0.58;
        state.velocityY = 0;
      }

      const runPhase = state.elapsed * state.speed * 0.85;
      const duckScaleY = state.ducking ? 0.48 : 1;
      const duckRot = state.ducking ? -0.38 : 0;
      dino.scale.y = THREE.MathUtils.lerp(dino.scale.y, duckScaleY, 12 * delta);
      dino.rotation.z = THREE.MathUtils.lerp(dino.rotation.z, duckRot, 10 * delta);

      dinoModelPivot.position.y = -0.56 + Math.abs(Math.sin(runPhase)) * (state.ducking ? 0.012 : 0.025);
      dinoModelPivot.rotation.x = Math.sin(runPhase + 0.6) * 0.035;
      dinoModelPivot.rotation.y = Math.sin(runPhase) * 0.045;
      dinoModelPivot.rotation.z = Math.sin(runPhase * 0.5) * 0.025;

      if (activeDinoAction) {
        activeDinoAction.timeScale = THREE.MathUtils.clamp(state.speed / 8.5, 0.75, 1.8);
      }
    }

    function updateObstacles(delta) {
      state.spawnTimer -= delta;
      if (state.spawnTimer <= 0) {
        spawnObstacle();
      }

      for (let i = obstacles.length - 1; i >= 0; i -= 1) {
        const obstacle = obstacles[i];
        obstacle.position.x -= state.speed * delta;

        if (obstacle.userData.type === "bird") {
          const flap = Math.sin(state.elapsed * 12 + obstacle.userData.phase) * 0.55;
          obstacle.userData.leftWing.rotation.z = flap;
          obstacle.userData.rightWing.rotation.z = -flap;
          obstacle.position.y += Math.sin(state.elapsed * 6 + obstacle.userData.phase) * delta * 0.12;
        }

        if (obstacle.position.x < -34) {
          scene.remove(obstacle);
          obstacles.splice(i, 1);
          continue;
        }

        if (collidesWithDino(obstacle)) {
          endGame();
        }
      }
    }

    function collidesWithDino(obstacle) {
      const dx = Math.abs(obstacle.position.x - dino.position.x);
      if (dx > obstacle.userData.radius + 0.48) {
        return false;
      }

      if (obstacle.userData.type === "bird") {
        const dinoTop = dino.position.y + (state.ducking ? 0.44 : 1.5);
        const dinoBottom = dino.position.y - 0.18;
        const birdTop = obstacle.position.y + 0.16;
        const birdBottom = obstacle.position.y - 0.16;
        return dinoBottom < birdTop && dinoTop > birdBottom;
      }

      const dinoBottom = dino.position.y - 0.18;
      const dinoTop = dino.position.y + (state.ducking ? 0.75 : 1.58);
      return dinoBottom < obstacle.userData.height && dinoTop > 0.08;
    }

    function updateWorld(delta, moveTrack = true) {
      if (moveTrack) {
        backgroundProps.forEach((prop) => {
          prop.position.x -= state.speed * delta * 0.28;
          if (prop.position.x < -58) {
            prop.position.x += 116;
          }
        });

        foregroundProps.forEach((prop) => {
          prop.position.x -= state.speed * delta;
          if (prop.position.x < -54) {
            prop.position.x += 108;
          }
        });
      }

      clouds.forEach((cloud) => {
        cloud.position.x -= delta * (0.8 + state.speed * 0.03);
        if (cloud.position.x < -18) {
          cloud.position.x = 24 + Math.random() * 6;
          cloud.position.y = 5.6 + Math.random() * 2;
        }
      });

      skyLife.forEach((bird) => {
        bird.position.x -= delta * 0.75;
        if (bird.position.x < -18) {
          bird.position.x = 24 + Math.random() * 8;
          bird.position.y = 5.2 + Math.random() * 1.2;
        }
        const flap = Math.sin(state.elapsed * 4 + bird.userData.phase) * 0.35;
        bird.userData.leftWing.rotation.z = flap;
        bird.userData.rightWing.rotation.z = -flap;
      });

      state.dayNight += delta * 0.035;
      const night = (Math.sin(state.dayNight) + 1) / 2;
      const sky = new THREE.Color().lerpColors(new THREE.Color(0xd9edf0), new THREE.Color(0x27364c), night * 0.82);
      const groundColor = new THREE.Color().lerpColors(new THREE.Color(0xf0d087), new THREE.Color(0x826d54), night * 0.65);
      const foregroundColor = new THREE.Color().lerpColors(new THREE.Color(0xe6c579), new THREE.Color(0x776753), night * 0.65);
      const distantColor = new THREE.Color().lerpColors(new THREE.Color(0xd8bd78), new THREE.Color(0x746552), night * 0.65);
      const duneColor = new THREE.Color().lerpColors(new THREE.Color(0xc9ad6f), new THREE.Color(0x6d604f), night * 0.65);
      const hillColor = new THREE.Color().lerpColors(new THREE.Color(0xb7a16d), new THREE.Color(0x665b4b), night * 0.65);
      const mesaColor = new THREE.Color().lerpColors(new THREE.Color(0xa9895d), new THREE.Color(0x5e5146), night * 0.65);
      scene.background = sky;
      scene.fog.color = sky;
      groundMaterial.color = groundColor;
      foregroundGroundMaterial.color = foregroundColor;
      distantGroundMaterial.color = distantColor;
      duneMaterial.color = duneColor;
      hillMaterial.color = hillColor;
      mesaMaterial.color = mesaColor;
      sunDisk.visible = night < 0.72;
      moonDisk.visible = night > 0.34;
      sunDisk.position.y = THREE.MathUtils.lerp(8.4, 5.8, night);
      moonDisk.position.y = THREE.MathUtils.lerp(5.7, 8.1, night);
      sun.intensity = THREE.MathUtils.lerp(2.6, 0.55, night);
      hemiLight.intensity = THREE.MathUtils.lerp(2.2, 0.75, night);
    }

    function updateScore(delta) {
      state.score += delta * state.speed * 6.4;
      state.speed += delta * 0.28;
      if (state.score >= state.nextScoreChime) {
        state.nextScoreChime += 250;
        playScoreSound();
      }
      scoreEl.textContent = formatScore(state.score);
    }

    const clock = new THREE.Clock();

    function animate() {
      const delta = Math.min(clock.getDelta(), 0.033);
      if (state.running) {
        state.elapsed += delta;
        updateScore(delta);
        updateDino(delta);
        updateObstacles(delta);
        updateWorld(delta);
      } else if (!state.gameOver) {
        updateWorld(delta * 0.28, false);
      }

      updateDust(delta);
      updateMenuSign(delta);

      if (dinoMixer) {
        dinoMixer.update(delta);
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.position.set(width < 700 ? 7.4 : 7.5, width < 700 ? 5.9 : 5.2, width < 700 ? 12.5 : 9.4);
      camera.lookAt(-0.8, 1.1, 0);
      camera.updateProjectionMatrix();

      const isMobile = width < 700;
      activeMenuHomePosition = (isMobile ? mobileMenuHomePosition : menuHomePosition).clone();
      activeMenuGameOverPosition = (isMobile ? mobileMenuGameOverPosition : menuGameOverPosition).clone();
      activeMenuExitPosition = (isMobile ? mobileMenuExitPosition : menuExitPosition).clone();
      menuGroup.scale.setScalar(isMobile ? 0.5 : 1);
      menuGroup.rotation.set(isMobile ? -0.02 : -0.05, isMobile ? 0.36 : 0.38, 0);

      if (!menuGroup.userData.exiting) {
        menuGroup.userData.target = (menuGroup.userData.mode === "gameover" ? activeMenuGameOverPosition : activeMenuHomePosition).clone();
        menuGroup.position.copy(menuGroup.userData.target);
      }
    }

    window.addEventListener("resize", resize);
    window.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "ArrowUp") {
        event.preventDefault();
        jump();
      }
      if (event.code === "ArrowDown") {
        event.preventDefault();
        dropFast();
      }
      if (event.code === "KeyR") {
        resetGame();
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "ArrowDown") {
        setDuck(false);
      }
    });

    canvas.addEventListener("pointerdown", (event) => {
      ensureAudio();
      if (!menuGroup.visible || menuGroup.userData.exiting) {
        if (event.button === 2) {
          event.preventDefault();
          dropFast();
          return;
        }
        if (event.button === 0) {
          jump();
        }
        return;
      }

      if (event.button === 2) {
        event.preventDefault();
        dropFast();
        return;
      }

      const rect = canvas.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const hits = raycaster.intersectObjects(menuGroup.children, true);
      if (hits.some((hit) => hit.object.userData.clickableMenu)) {
        resetGame();
      } else if (event.button === 0) {
        jump();
      }
    });

    canvas.addEventListener("pointerup", (event) => {
      if (event.button === 2) {
        setDuck(false);
      }
    });

    canvas.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    startButton.addEventListener("click", resetGame);
    restartButton.addEventListener("click", resetGame);
    jumpButton.addEventListener("pointerdown", jump);
    duckButton.addEventListener("pointerdown", dropFast);
    duckButton.addEventListener("pointerup", () => setDuck(false));
    duckButton.addEventListener("pointercancel", () => setDuck(false));
    shareButton.addEventListener("click", async () => {
      const text = `3D T-REX RUN: ${formatScore(state.score)} points`;
      try {
        await navigator.clipboard.writeText(text);
        shareButton.textContent = "Copied";
        window.setTimeout(() => {
          shareButton.textContent = "Copy Score";
        }, 1200);
      } catch {
        shareButton.textContent = "Copy Failed";
        window.setTimeout(() => {
          shareButton.textContent = "Copy Score";
        }, 1200);
      }
    });

    resize();
    animate();
  </script>
</body>
</html>
